name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Validate repo
        run: |
          python tools/validate_repo.py

      - name: Lint markdown (structural)
        run: |
          python tools/lint_markdown.py

      - name: Check internal links
        run: |
          python tools/check_links.py

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Validate Mermaid diagrams
        run: |
          set -euo pipefail
          awk '/```mermaid/{flag=1;next}/```/{if(flag){flag=0;exit}}flag{print}' docs/architecture.md > /tmp/architecture.mmd
          npm install --no-save mermaid@10.9.1
          node --input-type=module - <<'NODE'
          import fs from "fs";
          import mermaid from "mermaid";
          const code = fs.readFileSync("/tmp/architecture.mmd","utf8");
          try {
            await mermaid.parse(code);
            console.log("Mermaid parse OK");
          } catch (e) {
            console.error(e);
            process.exit(1);
          }
          NODE
